name: workers-ci
on:
  push:
    paths:
      - 'workers/**'
      - '.github/workflows/workers-ci.yml'
  pull_request:
    paths:
      - 'workers/**'
jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      billing-exists: ${{ steps.check.outputs.billing-exists }}
      has-secrets: ${{ steps.secrets.outputs.has-secrets }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f workers/billing/package-lock.json ]; then
            echo "billing-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "billing-exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::workers/billing/ not present on this branch; skipping billing jobs."
          fi
      - id: secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CF_API_TOKEN or CF_ACCOUNT_ID not configured; skipping deploy-billing."
          fi

  billing-typecheck:
    needs: guard
    if: needs.guard.outputs.billing-exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/billing/package-lock.json
      - name: Install
        working-directory: workers/billing
        run: npm ci
      - name: Type check (worker)
        working-directory: workers/billing
        run: npx tsc --noEmit

  deploy-billing:
    needs: [guard, billing-typecheck]
    if: needs.guard.outputs.billing-exists == 'true' && needs.guard.outputs.has-secrets == 'true' && github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production-billing
      url: https://chara-convert-billing.zmuleyu.workers.dev/api/billing/quota
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wrangler deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers/billing
          command: deploy
