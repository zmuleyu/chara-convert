name: web-ci
on:
  push:
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'chara-convert/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'chara-convert/**'
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Python deps (chara-convert + apps/api shim)
        run: |
          pip install -e ./chara-convert
          pip install -e ./apps/api
      - name: Install Node deps
        working-directory: apps/web
        run: npm ci
      - name: Type check
        working-directory: apps/web
        run: npm run typecheck
      - name: Vitest
        working-directory: apps/web
        run: npm test
      - name: Build (E2E-friendly, no env override)
        working-directory: apps/web
        run: npm run build
      - name: Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: E2E
        working-directory: apps/web
        run: npm run test:e2e
      - name: Upload Playwright trace + report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7

  lighthouse:
    needs: build-and-test
    if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/master' && github.event_name == 'push')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Build
        working-directory: apps/web
        run: npm run build
      - name: Lighthouse CI (warn-only)
        working-directory: apps/web
        run: npx -y @lhci/cli autorun --config=./lighthouserc.json || true

  preflight-deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CF_API_TOKEN or CF_ACCOUNT_ID not configured; skipping Cloudflare Pages deploy."
          fi

  deploy-pages:
    needs: [build-and-test, preflight-deploy]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && needs.preflight-deploy.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production-web
      url: https://studio.aichathub.uk/chara-convert/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Build with production env
        working-directory: apps/web
        env:
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE || 'https://chara-convert-shim.fly.dev' }}
          PUBLIC_BILLING_BASE: ${{ vars.PUBLIC_BILLING_BASE || 'https://chara-convert-billing.zmuleyu.workers.dev' }}
        run: npm run build
      - name: Cloudflare Pages deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: chara-convert-web
          directory: apps/web/dist
          branch: master
          wranglerVersion: '3'
